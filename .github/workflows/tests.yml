name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  unittest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # The suites are self-contained: adapters use injected getters and the
      # fetch_data tests seed in-memory state, so no API keys or network are
      # needed. discover picks up every test_*.py file.
      - name: Run unit tests
        run: python -m unittest discover -s . -p 'test_*.py' -v
