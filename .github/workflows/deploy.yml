name: Refresh data and deploy

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Restore fetch state (picks, odds, ratings, CI cadence)
        uses: actions/cache@v4
        with:
          path: |
            .ci_fetch_state.json
            data.json
            data_*.json
            picks_log*.json
            odds_open*.json
            ratings*.json
            title_open*.json
            *_cache.json
            player_db_*.json
            posts.json
            posts_state.json
            posts/*.html
          key: matchday-fetch-state-${{ github.run_id }}
          restore-keys: matchday-fetch-state-

      - name: Write private keys from secrets (never committed)
        run: |
          cat > config_keys.py <<EOF
          CFBD_KEY = "${{ secrets.CFBD_KEY }}"
          CBBD_KEY = "${{ secrets.CBBD_KEY }}"
          FOOTBALL_DATA_KEY = "${{ secrets.FOOTBALL_DATA_KEY }}"
          ODDS_API_KEY = "${{ secrets.ODDS_API_KEY }}"
          API_FOOTBALL_KEY = "${{ secrets.API_FOOTBALL_KEY }}"
          SPORTSDATAIO_KEY = "${{ secrets.SPORTSDATAIO_KEY }}"
          BALLDONTLIE_KEY = "${{ secrets.BALLDONTLIE_KEY }}"
          EOF

      - name: ONE-TIME seed merge (remove after this runs successfully)
        run: |
          python - <<'EOF'
          import json, os
          seed_path = "seed_picks_log_wc.json"
          if os.path.exists(seed_path):
              with open(seed_path, encoding="utf-8") as f:
                  seed = json.load(f)
              try:
                  with open("picks_log_wc.json", encoding="utf-8") as f:
                      current = json.load(f)
              except Exception:
                  current = {}
              added = 0
              for mid, pick in seed.items():
                  if mid not in current:
                      current[mid] = pick
                      added += 1
              with open("picks_log_wc.json", "w", encoding="utf-8") as f:
                  json.dump(current, f, ensure_ascii=False, indent=1)
              print(f"seed merge: added {added} of {len(seed)} picks (rest already present)")
          else:
              print("seed merge: no seed file, skipping")
          EOF

      - name: Fetch one adaptive round for all sports
        run: python multi_fetch.py --once

      - name: Assemble public site (curated allowlist only)
        run: |
          rm -f config_keys.py
          mkdir -p _site
          cp index.html styles.css translations.js legal.html qa.html content.html manifest.json _site/
          cp tactics-soccer.html tactics-football.html tactics-basketball.html tactics-baseball.html tactics-hockey.html _site/
          cp robots.txt sitemap.xml _site/
          cp app-1-core.js app-2-views.js app-3-panels.js app-4-features.js _site/
          cp favicon.ico favicon-16.png favicon-32.png matchday.ico _site/
          cp icon-180.png icon-192.png icon-512.png logo.png _site/
          cp data.json _site/
          cp data_*.json _site/
          cp posts.json _site/ 2>/dev/null || echo '[]' > _site/posts.json
          mkdir -p _site/posts
          cp posts/*.html _site/posts/ 2>/dev/null || true

      - name: Stamp asset URLs with this commit's SHA (cache-busting)
        run: |
          sed -i "s/__BUILD__/${GITHUB_SHA::8}/g" _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
