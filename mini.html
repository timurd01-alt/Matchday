<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Matchday Mini</title>
<link rel="icon" href="./matchday.ico?v=3" sizes="any"><link rel="icon" type="image/png" href="./icon-180.png?v=3">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>:root{--bg:#0a0d12;--panel:#141a24;--line:#26303e;--text:#eaeff5;--muted:#8794a4;--faint:#5b6678;--signal:#3ad17a;--live:#ff4d5e;--mono:"JetBrains Mono",monospace}*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%}body{background:var(--bg);color:var(--text);font-family:"Archivo",sans-serif;overflow:hidden;display:flex;flex-direction:column;border:1px solid var(--line)}.slide{flex:1;display:flex;flex-direction:column;justify-content:center;gap:5px;padding:12px 15px;opacity:1;transition:opacity .35s}.slide.fade{opacity:0}.tag{font-family:var(--mono);font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--signal);font-weight:700;display:flex;align-items:center;gap:6px}.tag .blink{width:6px;height:6px;border-radius:50%;background:var(--live);animation:bl 1.1s infinite}@keyframes bl{50%{opacity:.25}}.main{font-weight:900;font-size:1.25rem;letter-spacing:-.01em;line-height:1.05;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.sub{font-family:var(--mono);font-size:.72rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.dots{display:flex;gap:4px;justify-content:center;padding:0 0 7px}.dots i{width:5px;height:5px;border-radius:50%;background:var(--line);transition:.2s}.dots i.on{background:var(--signal);width:14px;border-radius:3px}.empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--faint);font-family:var(--mono);font-size:.74rem}#x{position:absolute;top:6px;right:8px;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--faint);font-size:13px;cursor:pointer;opacity:0;transition:.15s;z-index:5}body:hover #x{opacity:1}#x:hover{color:var(--text);background:var(--line)}</style></head><body>
<div id="x" onclick="if(window.pywebview&&pywebview.api)pywebview.api.close_mini()">&times;</div><div class="slide" id="slide"><div class="empty">loading…</div></div><div class="dots" id="dots"></div>
<script>let DATA={matches:[],news:[]},SLIDES=[],idx=0;const esc=s=>String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));const kickIn=iso=>{try{const m=Math.round((new Date(iso)-Date.now())/60000);return m<=0?'now':m<60?`in ${m}m`:m<1440?`in ${Math.round(m/60)}h`:`in ${Math.round(m/1440)}d`}catch(e){return''}};function build(){const s=[],M=DATA.matches||[];M.filter(m=>m.status==='LIVE').forEach(m=>s.push({tag:`<span class="blink"></span>LIVE${m.minute?` · ${m.minute}'`:''}`,main:`${esc(m.home.code)} ${m.score?.home??0}–${m.score?.away??0} ${esc(m.away.code)}`,sub:`${esc(m.home.name)} v ${esc(m.away.name)}`}));M.filter(m=>m.status==='UPCOMING').slice(0,2).forEach(m=>s.push({tag:`Next · ${kickIn(m.kickoff)}`,main:`${esc(m.home.name)} v ${esc(m.away.name)}`,sub:`${esc(m.stage||'')} · ${new Date(m.kickoff).toLocaleTimeString([],{hour:'numeric',minute:'2-digit'})}`}));(DATA.news||[]).slice(0,2).forEach(n=>s.push({tag:`News · ${esc(n.source||'')}`,main:esc(n.headline),sub:'latest headline'}));SLIDES=s.length?s:[{tag:'Matchday',main:'No live matches',sub:'Waiting for new data'}];idx=Math.min(idx,SLIDES.length-1)}function show(){const sl=document.getElementById('slide'),d=document.getElementById('dots');const x=SLIDES[idx]||{};sl.innerHTML=`<div class="tag">${x.tag||''}</div><div class="main">${x.main||''}</div><div class="sub">${x.sub||''}</div>`;d.innerHTML=SLIDES.map((_,i)=>`<i class="${i===idx?'on':''}"></i>`).join('')}async function load(){try{const r=await fetch('data.json?_='+Date.now());DATA=await r.json();build();show()}catch(e){document.getElementById('slide').innerHTML='<div class="empty">no data</div>'}}setInterval(()=>{if(!SLIDES.length)return;idx=(idx+1)%SLIDES.length;show()},5000);load();setInterval(load,60000);</script>
</body></html>
